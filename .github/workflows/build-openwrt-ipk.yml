name: Build OpenWrt IPK (sh compatible)

on:
  push:
    branches: [ build-for-openwrt, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ build-for-openwrt, master ]
  workflow_dispatch:

env:
  PACKAGE_NAME: "zeroclaw"
  OPENWRT_VERSION: "24.10.2"
  OPENWRT_TARGET: "rockchip/armv8"
  # Use Node.js 24 for JavaScript actions (Node.js 20 deprecated after June 2026)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-24.04
    container:
      image: ubuntu:24.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        apt-get update
        apt-get install -y \
          build-essential \
          ccache \
          ecj \
          fastjar \
          file \
          g++ \
          gawk \
          gettext \
          git \
          java-propose-classpath \
          libelf-dev \
          libncurses5-dev \
          libncursesw5-dev \
          libssl-dev \
          python3 \
          python3-setuptools \
          python3-dev \
          rsync \
          subversion \
          swig \
          time \
          unzip \
          wget \
          xsltproc \
          zlib1g-dev \
          jq \
          curl \
          ca-certificates \
          zstd \
          bc \
          bzip2 \
          flex \
          gcc \
          gcc-multilib \
          gzip \
          kmod \
          libc6-dev \
          libtool \
          make \
          patch \
          perl \
          pkg-config \
          tar \
          unzip \
          which

    - name: Download OpenWrt SDK
      id: download
      run: |
        VERSION="${{ env.OPENWRT_VERSION }}"
        echo "Downloading SDK for version: $VERSION"

        case "$VERSION" in
          "23.05.3")
            FILE="openwrt-sdk-23.05.3-rockchip-armv8_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
            ;;
          "24.10.2")
            FILE="openwrt-sdk-24.10.2-rockchip-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
            ;;
          *)
            echo "Unsupported version: $VERSION"
            exit 1
            ;;
        esac

        URL="https://downloads.openwrt.org/releases/$VERSION/targets/${{ env.OPENWRT_TARGET }}/$FILE"
        echo "Download URL: $URL"

        wget --progress=dot:giga "$URL" -O "$FILE"

        if [ ! -f "$FILE" ]; then
          echo "Download failed"
          exit 1
        fi

        echo "SDK_FILE=$FILE" >> $GITHUB_OUTPUT

    - name: Extract SDK
      run: |
        FILE="${{ steps.download.outputs.SDK_FILE }}"
        echo "Extracting $FILE..."

        case "$FILE" in
          *.tar.xz)
            tar -xvf "$FILE"
            ;;
          *.tar.zst)
            tar --zstd -xvf "$FILE"
            ;;
          *)
            echo "Unknown file format: $FILE"
            exit 1
            ;;
        esac

        SDK_DIR=$(find . -maxdepth 1 -type d -name "openwrt-sdk-*" | head -1)
        if [ -z "$SDK_DIR" ]; then
          echo "Could not find extracted SDK directory"
          ls -la
          exit 1
        fi

        rm -rf openwrt
        mv "$SDK_DIR" openwrt
        echo "OpenWrt SDK ready at: $(pwd)/openwrt"

    - name: Copy Makefile
      run: |
        mkdir -p openwrt/package/$PACKAGE_NAME

        if [ -f "Makefile" ]; then
          cp Makefile openwrt/package/$PACKAGE_NAME/
          echo "Makefile copied"
        else
          echo "Makefile not found"
          exit 1
        fi

    - name: Setup OpenWrt
      run: |
        cd openwrt
        
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
        echo "CONFIG_TARGET_rockchip=y" > .config
        echo "CONFIG_TARGET_rockchip_armv8=y" >> .config
        echo "CONFIG_PACKAGE_zeroclaw=m" >> .config
        
        make defconfig

    - name: Download sources
      run: |
        cd openwrt
        make download

    - name: Build package
      run: |
        cd openwrt
        make package/$PACKAGE_NAME/compile V=s

    - name: Find IPK file
      run: |
        cd openwrt
        IPK_FILE=$(find bin -name "*${PACKAGE_NAME}*.ipk" -type f | head -1)
        
        if [ -f "$IPK_FILE" ]; then
          echo "IPK_FILE=$IPK_FILE" >> $GITHUB_ENV
          echo "Found IPK: $IPK_FILE"
        else
          echo "IPK not found"
          exit 1
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: zeroclaw-${{ env.OPENWRT_VERSION }}
        path: openwrt/${{ env.IPK_FILE }}

name: Build OpenWrt IPK for ARM (Corrected URLs)

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'OpenWrt version'
        required: true
        default: '24.10.5'
        type: choice
        options:
          - '23.05.3'
          - '24.10.5'
          - '25.12.0'
      target_arch:
        description: 'Target architecture'
        required: true
        default: 'rockchip-armv8'
        type: string

env:
  PACKAGE_NAME: "zeroclaw"
  # 使用准确的架构名称
  TARGET_ARCH: "rockchip-armv8"
  # 镜像站点
  MIRROR_SITES: "https://downloads.openwrt.org https://mirror2.openwrt.org https://mirrors.tuna.tsinghua.edu.cn/openwrt"

jobs:
  build:
    runs-on: ubuntu-24.04
    container:
      image: ubuntu:24.04
      options: --privileged

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Determine OpenWrt version
      id: version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "VERSION=${{ github.event.inputs.openwrt_version }}" >> $GITHUB_OUTPUT
          echo "ARCH=${{ github.event.inputs.target_arch }}" >> $GITHUB_OUTPUT
        else
          echo "VERSION=24.10.5" >> $GITHUB_OUTPUT
          echo "ARCH=rockchip-armv8" >> $GITHUB_OUTPUT
        fi
        echo "OPENWRT_VERSION=${{ steps.version.outputs.VERSION }}" >> $GITHUB_ENV
        echo "TARGET_ARCH=${{ steps.version.outputs.ARCH }}" >> $GITHUB_ENV
        echo "Using OpenWrt version: ${{ steps.version.outputs.VERSION }}"
        echo "Target architecture: ${{ steps.version.outputs.ARCH }}"

    - name: Install build dependencies (including zstd)
      run: |
        apt-get update
        apt-get install -y \
          build-essential \
          ccache \
          ecj \
          fastjar \
          file \
          g++ \
          gawk \
          gettext \
          git \
          java-propose-classpath \
          libelf-dev \
          libncurses5-dev \
          libncursesw5-dev \
          libssl-dev \
          python3 \
          python3-distutils \
          python3-setuptools \
          python3-dev \
          python3-pip \
          rsync \
          subversion \
          swig \
          time \
          unzip \
          wget \
          xsltproc \
          zlib1g-dev \
          jq \
          curl \
          ca-certificates \
          gnupg \
          lsb-release \
          zstd  # 用于解压 .zst 文件

    - name: Download OpenWrt SDK directly
      id: download_sdk
      run: |
        VERSION="${{ env.OPENWRT_VERSION }}"
        ARCH="${{ env.TARGET_ARCH }}"
        
        echo "Downloading OpenWrt SDK version: $VERSION"
        
        # 根据版本确定文件名和 URL
        case "$VERSION" in
          "23.05.3")
            SDK_FILE="openwrt-sdk-23.05.3-${ARCH}_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
            ;;
          "24.10.5")
            SDK_FILE="openwrt-sdk-24.10.5-${ARCH}_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
            ;;
          "25.12.0")
            SDK_FILE="openwrt-sdk-25.12.0-${ARCH}_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
            ;;
          *)
            echo "Unsupported OpenWrt version: $VERSION"
            exit 1
            ;;
        esac
        
        echo "SDK filename: $SDK_FILE"
        
        # 尝试从多个镜像下载
        IFS=' ' read -ra MIRRORS <<< "$MIRROR_SITES"
        
        DOWNLOAD_SUCCESS=false
        for mirror in "${MIRRORS[@]}"; do
          echo "Trying mirror: $mirror"
          MIRROR_URL="${mirror}/releases/${VERSION}/targets/rockchip/armv8/$SDK_FILE"
          echo "URL: $MIRROR_URL"
          
          if curl -L --retry 3 --retry-delay 5 -o "$SDK_FILE" "$MIRROR_URL"; then
            echo "Download successful from $mirror"
            DOWNLOAD_SUCCESS=true
            break
          else
            echo "Download failed from $mirror"
            rm -f "$SDK_FILE"
          fi
        done
        
        if [ "$DOWNLOAD_SUCCESS" = false ]; then
          echo "Error: Failed to download SDK from all mirrors"
          echo "Manual download URLs:"
          for mirror in "${MIRRORS[@]}"; do
            echo "  ${mirror}/releases/${VERSION}/targets/rockchip/armv8/$SDK_FILE"
          done
          exit 1
        fi
        
        echo "SDK_FILE=$SDK_FILE" >> $GITHUB_OUTPUT
        echo "Download completed"

    - name: Extract SDK
      run: |
        SDK_FILE="${{ steps.download_sdk.outputs.SDK_FILE }}"
        echo "Extracting $SDK_FILE..."
        
        if [[ "$SDK_FILE" == *.tar.xz ]]; then
          tar -xf "$SDK_FILE"
        elif [[ "$SDK_FILE" == *.tar.zst ]]; then
          tar --zstd -xf "$SDK_FILE"
        fi
        
        # 重命名目录为 openwrt
        SDK_DIR=$(find . -maxdepth 1 -type d -name "openwrt-sdk-*" | head -1)
        if [ -n "$SDK_DIR" ]; then
          mv "$SDK_DIR" openwrt
          echo "Renamed $SDK_DIR to openwrt"
        else
          echo "Error: Could not find extracted SDK directory"
          exit 1
        fi
        
        echo "SDK extracted to: openwrt"

    - name: Create zeroclaw package directory
      run: |
        mkdir -p openwrt/package/$PACKAGE_NAME
        # Copy source code
        if [ -d "src" ]; then
          cp -r src openwrt/package/$PACKAGE_NAME/
          echo "Copied source code from src/"
        else
          # Create minimal example
          mkdir -p openwrt/package/$PACKAGE_NAME/src
          cat > openwrt/package/$PACKAGE_NAME/src/main.c << 'EOF'
#include <stdio.h>

int main() {
    printf("Zeroclaw Application for OpenWrt\n");
    printf("Built for version: ${{ env.OPENWRT_VERSION }}\n");
    return 0;
}
EOF
          echo "Created example source code"
        fi
        
        # Create Makefile
        cat > openwrt/package/$PACKAGE_NAME/Makefile << 'EOF'
include $(TOPDIR)/rules.mk

PKG_NAME:=zeroclaw
PKG_VERSION:=1.0.0
PKG_RELEASE:=1

PKG_MAINTAINER:=Zeroclaw Maintainer
PKG_LICENSE:=MIT

include $(INCLUDE_DIR)/package.mk

define Package/zeroclaw
  SECTION:=utils
  CATEGORY:=Utilities
  TITLE:=Zeroclaw Application
  URL:=https://github.com/${{ github.repository }}
  DEPENDS:=+libc
endef

define Package/zeroclaw/description
  Zeroclaw application for OpenWrt ${{ env.OPENWRT_VERSION }}
endef

define Build/Prepare
  mkdir -p $(PKG_BUILD_DIR)
  $(CP) ./src/* $(PKG_BUILD_DIR)/
endef

define Build/Configure
  # Nothing to configure
endef

define Build/Compile
  $(TARGET_CC) $(TARGET_CFLAGS) -o $(PKG_BUILD_DIR)/zeroclaw $(PKG_BUILD_DIR)/main.c
endef

define Package/zeroclaw/install
  $(INSTALL_DIR) $(1)/usr/bin
  $(INSTALL_BIN) $(PKG_BUILD_DIR)/zeroclaw $(1)/usr/bin/
endef

$(eval $(call BuildPackage,zeroclaw))
EOF
        echo "Created Makefile"

    - name: Update feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Configure build
      run: |
        cd openwrt
        # Minimal configuration
        echo "CONFIG_TARGET_rockchip=y" > .config
        echo "CONFIG_TARGET_rockchip_armv8=y" >> .config
        echo "CONFIG_PACKAGE_zeroclaw=m" >> .config
        make defconfig

    - name: Build package
      run: |
        cd openwrt
        echo "Building package..."
        make package/$PACKAGE_NAME/compile V=s 2>&1 | tee build.log
        
        if [ ${PIPESTATUS[0]} -eq 0 ]; then
          echo "Build successful!"
        else
          echo "Build failed. Last 50 lines of log:"
          tail -50 build.log
          exit 1
        fi

    - name: Find built package
      run: |
        cd openwrt
        # Search for IPK file
        IPK_FILE=$(find bin -name "*${PACKAGE_NAME}*.ipk" -type f | head -1)
        
        if [ -f "$IPK_FILE" ]; then
          echo "IPK_FILE=$IPK_FILE" >> $GITHUB_ENV
          echo "Package found: $IPK_FILE"
          echo "Size: $(du -h "$IPK_FILE" | cut -f1)"
        else
          echo "Error: No IPK file found"
          echo "Searching in bin directory:"
          find bin -type f -name "*.ipk" 2>/dev/null || true
          exit 1
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: zeroclaw-${{ env.OPENWRT_VERSION }}
        path: openwrt/${{ env.IPK_FILE }}
        retention-days: 30

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: openwrt/${{ env.IPK_FILE }}
        generate_release_notes: true

    - name: Upload build log on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log-${{ github.run_id }}
        path: openwrt/build.log
        retention-days: 7

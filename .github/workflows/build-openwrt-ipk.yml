name: Build OpenWrt IPK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      version:
        description: 'OpenWrt version'
        required: true
        default: '24.10.5'
        type: choice
        options:
          - '23.05.3'
          - '24.10.5'
          - '25.12.0'

env:
  PACKAGE_NAME: "zeroclaw"

jobs:
  build:
    runs-on: ubuntu-24.04
    container:
      image: ubuntu:24.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set version
      id: set_version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
        else
          echo "VERSION=24.10.5" >> $GITHUB_OUTPUT
        fi
        echo "OPENWRT_VERSION=${{ steps.set_version.outputs.VERSION }}" >> $GITHUB_ENV

    - name: Install deps
      run: |
        apt-get update
        apt-get install -y \
          build-essential \
          libncurses5-dev \
          libssl-dev \
          python3 \
          python3-dev \
          unzip \
          wget \
          curl \
          zstd

    - name: Download SDK
      run: |
        VERSION="${{ env.OPENWRT_VERSION }}"
        
        case "$VERSION" in
          "23.05.3")
            FILE="openwrt-sdk-23.05.3-rockchip-armv8_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
            ;;
          "24.10.5")
            FILE="openwrt-sdk-24.10.5-rockchip-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
            ;;
          "25.12.0")
            FILE="openwrt-sdk-25.12.0-rockchip-armv8_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
            ;;
        esac
        
        URL="https://downloads.openwrt.org/releases/$VERSION/targets/rockchip/armv8/$FILE"
        echo "Downloading $URL"
        wget "$URL"
        
        # Extract
        if [[ "$FILE" == *.tar.xz ]]; then
          tar -xf "$FILE"
        elif [[ "$FILE" == *.tar.zst ]]; then
          tar --zstd -xf "$FILE"
        fi
        
        # Rename to openwrt
        mv openwrt-sdk-* openwrt 2>/dev/null || true

    - name: Copy Makefile
      run: |
        mkdir -p openwrt/package/$PACKAGE_NAME
        cp zeroclaw-openwrt/Makefile openwrt/package/$PACKAGE_NAME/

    - name: Build
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
        echo "CONFIG_TARGET_rockchip=y" > .config
        echo "CONFIG_TARGET_rockchip_armv8=y" >> .config
        echo "CONFIG_PACKAGE_zeroclaw=m" >> .config
        make defconfig
        
        make package/$PACKAGE_NAME/compile V=s

    - name: Find IPK
      run: |
        cd openwrt
        IPK=$(find bin -name "*${PACKAGE_NAME}*.ipk" -type f | head -1)
        if [ -f "$IPK" ]; then
          echo "IPK_PATH=$IPK" >> $GITHUB_ENV
          echo "Found: $IPK"
        else
          echo "IPK not found"
          exit 1
        fi

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: zeroclaw-${{ env.OPENWRT_VERSION }}
        path: openwrt/${{ env.IPK_PATH }}
name: Build OpenWrt IPK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      version:
        description: 'OpenWrt version'
        required: true
        default: '24.10.5'
        type: choice
        options:
          - '23.05.3'
          - '24.10.5'
          - '25.12.0'

env:
  PACKAGE_NAME: "zeroclaw"

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set version
      id: version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
        else
          echo "VERSION=24.10.5" >> $GITHUB_OUTPUT
        fi

    - name: Install OpenWrt build dependencies
      run: |
        apt-get update
        # 安装所有必要的构建工具
        apt-get install -y \
          build-essential \
          ccache \
          ecj \
          fastjar \
          file \
          g++ \
          gawk \
          gettext \
          git \
          java-propose-classpath \
          libelf-dev \
          libncurses5-dev \
          libncursesw5-dev \
          libssl-dev \
          python3 \
          python3-distutils \
          python3-setuptools \
          python3-dev \
          rsync \
          subversion \
          swig \
          time \
          unzip \
          wget \
          xsltproc \
          zlib1g-dev \
          jq \
          curl \
          ca-certificates \
          zstd \
          bc \
          bzip2 \
          flex \
          gcc \
          gcc-multilib \
          gzip \
          kmod \
          libc6-dev \
          libtool \
          make \
          patch \
          perl \
          pkg-config \
          tar \
          unzip \
          which

    - name: Download and extract SDK
      run: |
        VERSION="${{ steps.version.outputs.VERSION }}"
        
        case "$VERSION" in
          "23.05.3")
            FILE="openwrt-sdk-23.05.3-rockchip-armv8_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
            ;;
          "24.10.5")
            FILE="openwrt-sdk-24.10.5-rockchip-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
            ;;
          "25.12.0")
            FILE="openwrt-sdk-25.12.0-rockchip-armv8_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
            ;;
        esac
        
        echo "Downloading $FILE..."
        wget "https://downloads.openwrt.org/releases/$VERSION/targets/rockchip/armv8/$FILE"
        
        case "$FILE" in
          *.tar.xz)
            tar -xf "$FILE"
            ;;
          *.tar.zst)
            tar --zstd -xf "$FILE"
            ;;
        esac
        
        mv openwrt-sdk-* openwrt

    - name: Copy Makefile
      run: |
        mkdir -p openwrt/package/$PACKAGE_NAME
        cp zeroclaw-openwrt/Makefile openwrt/package/$PACKAGE_NAME/

    - name: Setup OpenWrt environment
      run: |
        cd openwrt
        
        # 更新 feeds
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
        # 配置为 rockchip-armv8
        echo "CONFIG_TARGET_rockchip=y" > .config
        echo "CONFIG_TARGET_rockchip_armv8=y" >> .config
        echo "CONFIG_PACKAGE_zeroclaw=m" >> .config
        
        make defconfig

    - name: Download package sources
      run: |
        cd openwrt
        make download

    - name: Build package
      run: |
        cd openwrt
        make package/$PACKAGE_NAME/compile V=s

    - name: Find IPK file
      id: find_ipk
      run: |
        cd openwrt
        IPK=$(find bin -name "*$PACKAGE_NAME*.ipk" -type f | head -1)
        if [ -f "$IPK" ]; then
          echo "ipk_path=$IPK" >> $GITHUB_OUTPUT
          echo "Found IPK: $IPK"
        else
          echo "IPK not found"
          exit 1
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: zeroclaw-${{ steps.version.outputs.VERSION }}
        path: openwrt/${{ steps.find_ipk.outputs.ipk_path }}
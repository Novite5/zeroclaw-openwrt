name: Build OpenWrt IPK for ARM

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual triggering

env:
  OPENWRT_VERSION: "24.10.5"  # 改为最新版本
  TARGET_ARCH: "rockchip-armv8"  # 改为 rockchip 架构
  PACKAGE_NAME: "zeroclaw"

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: ubuntu:22.04
      options: --privileged  # Required for some build operations

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install build dependencies
      run: |
        apt-get update
        apt-get install -y \
          build-essential \
          ccache \
          ecj \
          fastjar \
          file \
          g++ \
          gawk \
          gettext \
          git \
          java-propose-classpath \
          libelf-dev \
          libncurses5-dev \
          libncursesw5-dev \
          libssl-dev \
          python3 \
          python3-distutils \
          python3-setuptools \
          python3-dev \
          rsync \
          subversion \
          swig \
          time \
          unzip \
          wget \
          xsltproc \
          zlib1g-dev \
          jq \
          curl \
          zstd  # 添加 zstd 用于解压 .zst 文件

    - name: Download OpenWrt SDK
      run: |
        # 下载对应版本的 SDK
        SDK_FILE="openwrt-sdk-$OPENWRT_VERSION-$TARGET_ARCH"
        
        if [[ "$OPENWRT_VERSION" == "23.05.3" ]]; then
          SDK_FILE="${SDK_FILE}_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
        elif [[ "$OPENWRT_VERSION" == "24.10.5" ]]; then
          SDK_FILE="${SDK_FILE}_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
        elif [[ "$OPENWRT_VERSION" == "25.12.0" ]]; then
          SDK_FILE="${SDK_FILE}_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
        fi
        
        SDK_URL="https://downloads.openwrt.org/releases/$OPENWRT_VERSION/targets/rockchip/armv8/$SDK_FILE"
        
        echo "Downloading OpenWrt SDK from: $SDK_URL"
        wget "$SDK_URL" -O "$SDK_FILE"
        
        # 解压 SDK
        if [[ "$SDK_FILE" == *.tar.xz ]]; then
          tar -xf "$SDK_FILE"
        elif [[ "$SDK_FILE" == *.tar.zst ]]; then
          tar --zstd -xf "$SDK_FILE"
        fi
        
        # 重命名目录为 openwrt
        SDK_DIR=$(find . -maxdepth 1 -type d -name "openwrt-sdk-*" | head -1)
        if [ -n "$SDK_DIR" ]; then
          mv "$SDK_DIR" openwrt
        else
          echo "Error: Could not find SDK directory"
          exit 1
        fi

    - name: Update feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Create zeroclaw package directory
      run: |
        mkdir -p openwrt/package/$PACKAGE_NAME
        # 使用现有的 Makefile
        if [ -f "zeroclaw-openwrt/Makefile" ]; then
          cp zeroclaw-openwrt/Makefile openwrt/package/$PACKAGE_NAME/
        else
          echo "Error: Makefile not found"
          exit 1
        fi

    - name: Configure OpenWrt for target
      run: |
        cd openwrt
        # 配置为 rockchip-armv8
        cat > .config << 'EOF'
CONFIG_TARGET_rockchip=y
CONFIG_TARGET_rockchip_armv8=y
CONFIG_PACKAGE_zeroclaw=m
EOF
        make defconfig

    - name: Download sources
      run: |
        cd openwrt
        make download

    - name: Build zeroclaw package
      run: |
        cd openwrt
        make package/$PACKAGE_NAME/compile V=s -j$(nproc)

    - name: Find IPK file
      run: |
        cd openwrt
        # 查找 IPK 文件
        IPK_FILE=$(find bin -name "*${PACKAGE_NAME}*.ipk" -type f | head -1)
        if [ -f "$IPK_FILE" ]; then
          echo "IPK_FILE=$IPK_FILE" >> $GITHUB_ENV
          echo "Found IPK: $IPK_FILE"
        else
          echo "No IPK file found!"
          exit 1
        fi

    - name: Upload IPK artifact
      uses: actions/upload-artifact@v4
      with:
        name: zeroclaw-ipk
        path: openwrt/${{ env.IPK_FILE }}
        retention-days: 7

    - name: Create release on tag
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: openwrt/${{ env.IPK_FILE }}
        generate_release_notes: true
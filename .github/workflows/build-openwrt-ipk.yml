name: Build OpenWrt IPK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      version:
        description: 'OpenWrt version'
        required: true
        default: '24.10.5'
        type: choice
        options:
          - '23.05.3'
          - '24.10.5'
          - '25.12.0'

env:
  PACKAGE_NAME: "zeroclaw"

jobs:
  build:
    runs-on: ubuntu-24.04
    container:
      image: ubuntu:24.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set version
      id: set_version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION="24.10.5"
        fi
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "Using OpenWrt version: $VERSION"

    - name: Install dependencies
      run: |
        apt-get update
        apt-get install -y \
          build-essential \
          libncurses5-dev \
          libssl-dev \
          python3 \
          python3-dev \
          unzip \
          wget \
          curl \
          zstd

    - name: Download OpenWrt SDK
      run: |
        # 使用环境变量 ${{ env.VERSION }}
        VERSION="${{ env.VERSION }}"
        echo "Downloading SDK for version: $VERSION"
        
        # 根据版本确定文件名
        case "$VERSION" in
          "23.05.3")
            FILE="openwrt-sdk-23.05.3-rockchip-armv8_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
            ;;
          "24.10.5")
            FILE="openwrt-sdk-24.10.5-rockchip-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
            ;;
          "25.12.0")
            FILE="openwrt-sdk-25.12.0-rockchip-armv8_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
            ;;
          *)
            echo "Unsupported version: $VERSION"
            exit 1
            ;;
        esac
        
        # 构建完整的 URL
        URL="https://downloads.openwrt.org/releases/$VERSION/targets/rockchip/armv8/$FILE"
        echo "Download URL: $URL"
        
        # 下载文件
        wget "$URL" -O "$FILE"
        
        if [ ! -f "$FILE" ]; then
          echo "Download failed"
          exit 1
        fi
        
        echo "Download successful: $FILE"

    - name: Extract SDK
      run: |
        VERSION="${{ env.VERSION }}"
        
        # 确定文件名
        case "$VERSION" in
          "23.05.3")
            FILE="openwrt-sdk-23.05.3-rockchip-armv8_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
            ;;
          "24.10.5")
            FILE="openwrt-sdk-24.10.5-rockchip-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
            ;;
          "25.12.0")
            FILE="openwrt-sdk-25.12.0-rockchip-armv8_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
            ;;
        esac
        
        echo "Extracting $FILE..."
        
        # 解压
        if [[ "$FILE" == *.tar.xz ]]; then
          tar -xf "$FILE"
        elif [[ "$FILE" == *.tar.zst ]]; then
          tar --zstd -xf "$FILE"
        fi
        
        # 重命名目录
        SDK_DIR=$(ls -d openwrt-sdk-* 2>/dev/null | head -1)
        if [ -n "$SDK_DIR" ]; then
          mv "$SDK_DIR" openwrt
          echo "Extracted to: openwrt"
        else
          echo "Error: Could not find extracted SDK directory"
          exit 1
        fi

    - name: Copy Makefile
      run: |
        mkdir -p openwrt/package/$PACKAGE_NAME
        if [ -f "zeroclaw-openwrt/Makefile" ]; then
          cp zeroclaw-openwrt/Makefile openwrt/package/$PACKAGE_NAME/
          echo "Makefile copied"
        else
          echo "Error: Makefile not found"
          exit 1
        fi

    - name: Setup and build
      run: |
        cd openwrt
        
        # 更新 feeds
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
        # 配置
        echo "CONFIG_TARGET_rockchip=y" > .config
        echo "CONFIG_TARGET_rockchip_armv8=y" >> .config
        echo "CONFIG_PACKAGE_zeroclaw=m" >> .config
        make defconfig
        
        # 构建
        make package/$PACKAGE_NAME/compile V=s

    - name: Find and upload IPK
      run: |
        cd openwrt
        # 查找 IPK 文件
        IPK_FILE=$(find bin -name "*${PACKAGE_NAME}*.ipk" -type f | head -1)
        
        if [ -f "$IPK_FILE" ]; then
          echo "IPK_FILE=$IPK_FILE" >> $GITHUB_ENV
          echo "Found IPK: $IPK_FILE"
        else
          echo "IPK not found"
          exit 1
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: zeroclaw-${{ env.VERSION }}
        path: openwrt/${{ env.IPK_FILE }}
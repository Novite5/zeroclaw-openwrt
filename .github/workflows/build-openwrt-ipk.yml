name: Build OpenWrt IPK for ARM

on:
  push:
    branches: [ main, master ]
    paths:
      - 'zeroclaw-openwrt/**'
      - '.github/workflows/build-openwrt-ipk.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'zeroclaw-openwrt/**'
      - '.github/workflows/build-openwrt-ipk.yml'
  workflow_dispatch:
    inputs:
      target_arch:
        description: 'Target architecture'
        required: true
        default: 'aarch64_cortex-a53'
        type: choice
        options:
          - aarch64_cortex-a53
          - arm_cortex-a7_neon-vfpv4
          - arm_cortex-a9
          - mipsel_24kc
      openwrt_version:
        description: 'OpenWrt version'
        required: true
        default: '24.10.6'
        type: choice
        options:
          - '25.12.0'
          - '24.10.5'
          - '23.05.6'
          - '22.03.7'
          - 'snapshot'

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        target_arch:
          - aarch64_cortex-a53
          - arm_cortex-a7_neon-vfpv4
          - arm_cortex-a9
        openwrt_version: ['23.05.3']

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up build environment
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          libncurses5-dev \
          libncursesw5-dev \
          zlib1g-dev \
          gawk \
          git \
          gettext \
          libssl-dev \
          xsltproc \
          wget \
          unzip \
          python3 \
          python3-setuptools \
          rsync \
          curl \
          cargo \
          rustc

    - name: Download OpenWrt SDK
      run: |
        ARCH=$(echo "${{ matrix.target_arch }}" | cut -d'_' -f1)
        SDK_URL=""

        case "${{ matrix.openwrt_version }}" in
          "23.05.3")
            case "${{ matrix.target_arch }}" in
              "aarch64_cortex-a53")
                SDK_URL="https://downloads.openwrt.org/releases/23.05.3/targets/armvirt/64/openwrt-sdk-23.05.3-armvirt-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
                ;;
              "arm_cortex-a7_neon-vfpv4")
                SDK_URL="https://downloads.openwrt.org/releases/23.05.3/targets/sunxi/cortexa7/openwrt-sdk-23.05.3-sunxi-cortexa7_gcc-12.3.0_musl_eabi.Linux-x86_64.tar.xz"
                ;;
              "arm_cortex-a9")
                SDK_URL="https://downloads.openwrt.org/releases/23.05.3/targets/armvirt/32/openwrt-sdk-23.05.3-armvirt-32_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
                ;;
            esac
            ;;
        esac

        if [ -n "$SDK_URL" ]; then
          echo "Downloading SDK: $SDK_URL"
          wget -q "$SDK_URL" -O openwrt-sdk.tar.xz
          tar -xf openwrt-sdk.tar.xz
          mv openwrt-sdk-* openwrt-sdk
        else
          echo "Error: No SDK URL found for target ${{ matrix.target_arch }} and version ${{ matrix.openwrt_version }}"
          exit 1
        fi

    - name: Prepare ZeroClaw source
      run: |
        # Clone zeroclaw source
        git clone --depth 1 https://github.com/zeroclaw-labs/zeroclaw.git zeroclaw-source

        # Prepare source directory for OpenWrt build
        mkdir -p zeroclaw-openwrt/src
        cp -r zeroclaw-source/* zeroclaw-openwrt/src/

        # Clean up git files to reduce size
        find zeroclaw-openwrt/src -name ".git" -type d -exec rm -rf {} + 2>/dev/null || true
        find zeroclaw-openwrt/src -name ".github" -type d -exec rm -rf {} + 2>/dev/null || true

    - name: Copy package to SDK
      run: |
        # Copy our OpenWrt package to SDK
        cp -r zeroclaw-openwrt openwrt-sdk/package/

        # Create feeds.conf to include our local package
        echo "src-link zeroclaw $(pwd)/openwrt-sdk/package" > openwrt-sdk/feeds.conf

    - name: Update feeds and configure
      run: |
        cd openwrt-sdk
        ./scripts/feeds update -a
        ./scripts/feeds install -a

        # Configure to build only zeroclaw package
        cat > .config << EOF
        CONFIG_TARGET_${{ matrix.target_arch }}=y
        CONFIG_PACKAGE_zeroclaw=m
        EOF

        # Run oldconfig to set defaults
        make defconfig

    - name: Build ZeroClaw package
      run: |
        cd openwrt-sdk
        make package/zeroclaw/compile V=s -j$(nproc)

        # Check if package was built
        ARCH_DIR=$(find bin/packages -type d -name "*${{ matrix.target_arch }}*" | head -1)
        if [ -n "$ARCH_DIR" ]; then
          IPK_FILE=$(find "$ARCH_DIR" -name "zeroclaw*.ipk" | head -1)
          if [ -f "$IPK_FILE" ]; then
            echo "Package built: $IPK_FILE"
            # Copy to workspace for artifact upload
            mkdir -p ../artifacts
            cp "$IPK_FILE" "../artifacts/zeroclaw-${{ matrix.target_arch }}.ipk"
          else
            echo "Error: IPK file not found"
            ls -la "$ARCH_DIR"/
            exit 1
          fi
        else
          echo "Error: Architecture directory not found"
          ls -la bin/packages/
          exit 1
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: zeroclaw-${{ matrix.target_arch }}
        path: artifacts/zeroclaw-${{ matrix.target_arch }}.ipk
        retention-days: 7

    - name: Create release on tag
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        # This would be expanded to create GitHub releases
        echo "Tag detected: ${{ github.ref }}"
        # In a real workflow, you'd upload all artifacts to the release
        # For now, we'll just note it
        echo "Release artifacts would be uploaded here"

  test:
    runs-on: ubuntu-22.04
    needs: build
    if: github.event_name == 'workflow_dispatch'

    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Test IPK structure
      run: |
        # Install ipkg-utils for testing
        sudo apt-get install -y ipkg-utils

        for ipk in artifacts/*/*.ipk; do
          echo "Testing IPK: $ipk"

          # Extract IPK
          mkdir -p test-ipk
          tar -xzf "$ipk" -C test-ipk

          # Check control file
          if [ -f "test-ipk/control.tar.gz" ]; then
            tar -xzf test-ipk/control.tar.gz -C test-ipk
            echo "Control contents:"
            cat test-ipk/control 2>/dev/null || true
          fi

          # Check data file
          if [ -f "test-ipk/data.tar.gz" ]; then
            tar -xzf test-ipk/data.tar.gz -C test-ipk
            echo "File structure:"
            find test-ipk -type f | sort
          fi

          rm -rf test-ipk
          echo "---"
        done

    - name: Summary
      run: |
        echo "Build completed successfully!"
        echo "Target architectures:"
        ls artifacts/ 2>/dev/null || echo "No artifacts found"
        echo ""
        echo "IPK packages are ready for deployment to OpenWrt devices."

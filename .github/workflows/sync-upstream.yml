name: Sync Upstream Changes

on:
  schedule:
    # Sync every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      sync_branch:
        description: 'Branch to sync from upstream'
        required: false
        default: 'master'
        type: choice
        options:
          - master
          - main

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          persist-credentials: true
      
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y curl jq git
      
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/zeroclaw-labs/zeroclaw.git || true
          git remote -v
      
      - name: Fetch upstream
        run: |
          git fetch upstream --tags
      
      - name: Sync branch
        id: sync
        run: |
          BRANCH="${{ github.event.inputs.sync_branch || 'master' }}"
          echo "Syncing branch: $BRANCH"
          
          # Configure git with bot user
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Fetch upstream
          git remote add upstream https://github.com/zeroclaw-labs/zeroclaw.git 2>/dev/null || true
          git fetch upstream "$BRANCH" --tags
          
          # Save our workflow files to temp location
          mkdir -p /tmp/our-files
          cp -r .github/workflows /tmp/our-files/ 2>/dev/null || true
          cp Makefile /tmp/our-files/ 2>/dev/null || true
          cp -r files /tmp/our-files/ 2>/dev/null || true
          
          # Reset to upstream and restore our files
          git fetch upstream "$BRANCH"
          git reset --hard upstream/"$BRANCH"
          
          # Restore our workflow files
          cp -r /tmp/our-files/workflows .github/ 2>/dev/null || true
          cp /tmp/our-files/Makefile . 2>/dev/null || true
          cp -r /tmp/our-files/files . 2>/dev/null || true
          
          # Check if there are changes to commit
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "chore: sync upstream changes and preserve build workflows
            
            - Sync from zeroclaw-labs/zeroclaw/$BRANCH
            - Preserve OpenWrt build workflow files
            - Auto-generated by GitHub Actions"
            
            # Push using GITHUB_TOKEN with explicit workflow permission bypass
            # Use --no-verify to skip pre-push hooks
            git push origin HEAD:build-for-openwrt --force
            echo "changes_detected=true" >> $GITHUB_OUTPUT
            echo "Synced to commit: $(git rev-parse HEAD)"
          else
            echo "changes_detected=false" >> $GITHUB_OUTPUT
            echo "No new upstream changes"
          fi
      
      - name: Create PR if there are conflicts
        if: false  # Disabled - direct push is used instead
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          branch: upstream-sync
          title: 'chore: sync upstream changes'
          body: |
            Automated sync from upstream zeroclaw-labs/zeroclaw.
            
            This PR preserves:
            - `.github/workflows/build-openwrt-ipk.yml` (OpenWrt build workflow)
            - `Makefile` (OpenWrt package definition)
            - `files/` directory (config and init scripts)
            
            ---
            Auto-generated by GitHub Actions
          base: build-for-openwrt
          delete-branch: true
